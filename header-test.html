<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HypeShow — Header Test</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --coral: #e8623a;
    --coral-light: #f07a56;
    --coral-dim: rgba(232,98,58,0.12);
    --dark:  #1c1c1e;
    --dark2: #2c2c2e;
    --dark3: #3a3a3c;
    --gray:  #6e6e73;
    --gray-light: #aeaeb2;
    --white: #ffffff;
  }

  html[data-theme="light"] {
    --dark:  #f5f5f7;
    --dark2: #e8e8ed;
    --dark3: #d2d2d7;
    --gray-light: #3a3a3c;
    --white: #1c1c1e;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 200px;
  }

  /* ── NAV ───────────────────────────────────────────────────── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: 70px;
    padding: 0 5%;
    background: rgba(28,28,30,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
  }

  html[data-theme="light"] nav {
    background: rgba(245,245,247,0.95);
  }

  /* ── LOGO (left) ──────────────────────────────────────────── */
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-mark {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 28px;
  }

  .logo-bar {
    width: 6px;
    background: var(--coral);
    border-radius: 2px 2px 0 0;
  }
  .logo-bar:nth-child(1) { height: 14px; }
  .logo-bar:nth-child(2) { height: 21px; }
  .logo-bar:nth-child(3) { height: 28px; }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--white);
  }
  .logo-text span { color: var(--coral); }

  /* ── NAV LINKS (center, absolutely positioned) ───────────── */
  .nav-links {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 32px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .nav-links a {
    color: var(--gray-light);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .nav-links a:hover { color: var(--white); }

  /* ── RIGHT SIDE: CTA + HAMBURGER ─────────────────────────── */
  .nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
  }

  .btn-nav {
    background: var(--coral);
    color: #fff;
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .btn-nav:hover { background: var(--coral-light); transform: translateY(-1px); }

  /* Hamburger button */
  .nav-menu-btn {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    background: none;
    border: 1.5px solid rgba(255,255,255,0.18);
    cursor: pointer;
    padding: 8px 9px;
    border-radius: 8px;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .nav-menu-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.35);
  }
  .nav-menu-btn.open {
    border-color: var(--coral);
    background: var(--coral-dim);
  }

  .nav-menu-btn span {
    display: block;
    width: 20px;
    height: 2px;
    background: var(--white);
    border-radius: 2px;
    transition: all 0.28s ease;
  }
  .nav-menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-menu-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .nav-menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ── DRAWER OVERLAY ───────────────────────────────────────── */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    top: 70px;
    background: rgba(0,0,0,0.4);
    z-index: 98;
  }
  .drawer-overlay.open { display: block; }

  /* ── DRAWER PANEL ─────────────────────────────────────────── */
  .nav-drawer {
    position: fixed;
    top: 70px; right: 0;
    width: 280px;
    height: calc(100vh - 70px);
    background: var(--dark2);
    border-left: 1px solid var(--dark3);
    padding: 28px 20px;
    z-index: 99;
    transform: translateX(100%);
    transition: transform 0.28s ease;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .nav-drawer.open { transform: translateX(0); }

  /* Mobile nav links inside drawer */
  .drawer-nav-links {
    display: none;
    flex-direction: column;
    gap: 2px;
  }
  .drawer-nav-links a {
    color: var(--gray-light);
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    padding: 11px 8px;
    border-bottom: 1px solid var(--dark3);
    transition: color 0.2s;
    display: block;
  }
  .drawer-nav-links a:last-child { border-bottom: none; }
  .drawer-nav-links a:hover { color: var(--white); }

  .drawer-sep { height: 1px; background: var(--dark3); }

  .drawer-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 12px;
  }

  /* Language grid */
  .lang-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .lang-option {
    background: var(--dark3);
    border: 1px solid transparent;
    color: var(--gray-light);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 4px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }
  .lang-option:hover { background: var(--dark); color: var(--white); }
  .lang-option.active {
    background: var(--coral-dim);
    border-color: var(--coral);
    color: var(--coral);
  }

  /* Theme toggle */
  .theme-row { display: flex; gap: 8px; }
  .theme-btn {
    flex: 1;
    background: var(--dark3);
    border: 1px solid transparent;
    color: var(--gray-light);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .theme-btn:hover { color: var(--white); }
  .theme-btn.active {
    background: var(--coral-dim);
    border-color: var(--coral);
    color: var(--coral);
  }

  /* ── MOBILE ───────────────────────────────────────────────── */
  @media (max-width: 960px) {
    .nav-links { display: none; }
    .nav-right .btn-nav { display: none; }
    .drawer-nav-links { display: flex; }
  }

  /* Demo spacer */
  .demo-body {
    padding-top: 90px;
    padding-left: 5%;
    color: var(--gray);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- ══ NAV ══════════════════════════════════════════════════════ -->
<nav>
  <!-- LEFT: Logo -->
  <a href="#" class="nav-logo" aria-label="HypeShow home">
    <div class="logo-mark" aria-hidden="true">
      <div class="logo-bar"></div>
      <div class="logo-bar"></div>
      <div class="logo-bar"></div>
    </div>
    <div class="logo-text">Hype<span>Show</span></div>
  </a>

  <!-- CENTER: Nav links -->
  <ul class="nav-links" role="list">
    <li><a href="#how">How It Works</a></li>
    <li><a href="#team">The Team</a></li>
    <li><a href="#pricing">Pricing</a></li>
    <li><a href="#about">About</a></li>
  </ul>

  <!-- RIGHT: CTA + Hamburger -->
  <div class="nav-right">
    <a href="#waitlist" class="btn-nav">Join Beta</a>
    <button class="nav-menu-btn" id="navMenuBtn" aria-label="Open menu" aria-expanded="false" onclick="toggleDrawer()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- Drawer panel -->
<div class="nav-drawer" id="navDrawer" role="dialog" aria-label="Settings">

  <!-- Mobile-only nav links -->
  <div class="drawer-nav-links">
    <a href="#how"      onclick="closeDrawer()">How It Works</a>
    <a href="#team"     onclick="closeDrawer()">The Team</a>
    <a href="#pricing"  onclick="closeDrawer()">Pricing</a>
    <a href="#about"    onclick="closeDrawer()">About</a>
    <a href="#faq"      onclick="closeDrawer()">FAQ</a>
    <a href="#waitlist" onclick="closeDrawer()" style="color:var(--coral);font-weight:700;">Join Beta</a>
    <div class="drawer-sep" style="margin-top:8px;"></div>
  </div>

  <!-- Language -->
  <div>
    <div class="drawer-label">Language</div>
    <div class="lang-grid">
      <button class="lang-option active" data-lang="en">EN</button>
      <button class="lang-option" data-lang="es">ES</button>
      <button class="lang-option" data-lang="fr">FR</button>
      <button class="lang-option" data-lang="de">DE</button>
      <button class="lang-option" data-lang="no">NO</button>
      <button class="lang-option" data-lang="zh">中文</button>
      <button class="lang-option" data-lang="ja">日本語</button>
      <button class="lang-option" data-lang="ko">한국어</button>
      <button class="lang-option" data-lang="hi">हिन्दी</button>
      <button class="lang-option" data-lang="ar">عربية</button>
      <button class="lang-option" data-lang="he">עברית</button>
    </div>
  </div>

  <div class="drawer-sep"></div>

  <!-- Theme -->
  <div>
    <div class="drawer-label">Theme</div>
    <div class="theme-row">
      <button class="theme-btn active" id="theme-dark"  onclick="setTheme('dark')">Dark</button>
      <button class="theme-btn"        id="theme-light" onclick="setTheme('light')">Light</button>
    </div>
  </div>

</div>

<div class="demo-body">← Header test file. Scroll or resize to test responsive behaviour.</div>

<script>
  function toggleDrawer() {
    const drawer  = document.getElementById('navDrawer');
    const overlay = document.getElementById('drawerOverlay');
    const btn     = document.getElementById('navMenuBtn');
    const isOpen  = drawer.classList.toggle('open');
    overlay.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
    btn.setAttribute('aria-expanded', isOpen);
  }

  function closeDrawer() {
    document.getElementById('navDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
    const btn = document.getElementById('navMenuBtn');
    btn.classList.remove('open');
    btn.setAttribute('aria-expanded', false);
  }

  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('theme-dark').classList.toggle('active',  t === 'dark');
    document.getElementById('theme-light').classList.toggle('active', t === 'light');
  }

  document.querySelectorAll('.lang-option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
</script>
</body>
</html>
